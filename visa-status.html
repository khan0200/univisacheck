<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Visa Status Check — KoreaVisa</title>
    <meta name="description" content="Check your Korean visa application status instantly. Free, no signup required. Supports Embassy and E-Visa applications via visa.go.kr.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛂</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* ─── RESET & TOKENS ──────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #09090f;
            --bg-card:      rgba(255,255,255,0.04);
            --bg-input:     rgba(255,255,255,0.06);
            --border:       rgba(255,255,255,0.09);
            --border-focus: rgba(26,103,224,0.55);
            --text:         #f0f0f5;
            --text-2:       #9fa0bc;
            --text-3:       #54556a;
            --accent:       #1a67e0;
            --red:          #e8304a;
            --approved:     #30d158;
            --pending:      #ff9f0a;
            --review:       #1a67e0;
            --rejected:     #e8304a;
            --received:     #f5c542;
            --font:         'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --ease:         cubic-bezier(0.32, 0.72, 0, 1);
            --spring:       cubic-bezier(0.34, 1.56, 0.64, 1);
            --dur:          0.22s;
            --radius-sm:    8px;
            --radius:       12px;
            --radius-lg:    18px;
            --radius-xl:    24px;
            --nav-h:        60px;
        }

        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ─── SUBTLE BACKGROUND ───────────────────────────────────── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.14;
        }
        .bg-orb-1 {
            width: 480px; height: 480px;
            background: radial-gradient(circle, #1a67e0, transparent 70%);
            top: -180px; left: -120px;
        }
        .bg-orb-2 {
            width: 360px; height: 360px;
            background: radial-gradient(circle, #e8304a, transparent 70%);
            bottom: -100px; right: -80px;
        }

        /* ─── TOP NAV ─────────────────────────────────────────────── */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--nav-h);
            background: rgba(9,9,15,0.85);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border-bottom: 1px solid var(--border);
        }
        .top-nav-inner {
            max-width: 560px;
            margin: 0 auto;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 9px;
            text-decoration: none;
            color: var(--text);
        }
        .nav-logo-icon {
            width: 30px; height: 30px;
            background: var(--red);
            border-radius: 8px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }
        .nav-logo-icon svg { width: 16px; height: 16px; stroke: #fff; }
        .nav-logo-text {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.04em;
        }
        .nav-logo-text span { color: var(--red); }
        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-2);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            transition: color var(--dur) var(--ease), background var(--dur) var(--ease);
            min-height: 36px;
        }
        .nav-back:hover {
            color: var(--text);
            background: rgba(255,255,255,0.06);
        }
        .nav-back svg { width: 14px; height: 14px; flex-shrink: 0; }

        /* ─── PAGE LAYOUT ─────────────────────────────────────────── */
        .page {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100dvh - var(--nav-h));
            padding: 40px 20px 64px;
            animation: fadeIn 0.4s ease both;
        }

        /* ─── HEADER ──────────────────────────────────────────────── */
        .page-header {
            text-align: center;
            margin-bottom: 32px;
            width: 100%;
            max-width: 520px;
            animation: slideDown 0.6s var(--ease) both;
        }
        .page-header h1 {
            font-size: clamp(24px, 5.5vw, 42px);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: var(--text);
            margin-bottom: 10px;
        }
        .page-header p {
            font-size: 15px;
            color: var(--text-2);
            line-height: 1.60;
        }

        /* ─── MAIN CARD ───────────────────────────────────────────── */
        .card {
            width: 100%;
            max-width: 520px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 28px;
            animation: slideUp 0.6s var(--ease) 0.05s both;
            box-shadow: 0 4px 32px rgba(0,0,0,0.40), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        /* ─── SEGMENT CONTROL ─────────────────────────────────────── */
        .segment-wrap {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px;
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
        }
        .segment-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-2);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            padding: 12px 10px;
            min-height: 48px;
            border-radius: calc(var(--radius) - 3px);
            cursor: pointer;
            transition: color var(--dur) var(--ease), background var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
            -webkit-tap-highlight-color: transparent;
        }
        .segment-btn.active {
            background: rgba(255,255,255,0.09);
            color: var(--text);
            box-shadow: 0 1px 6px rgba(0,0,0,0.25);
        }
        .segment-btn:not(.active):hover {
            color: var(--text);
            background: rgba(255,255,255,0.04);
        }

        /* ─── FORM FIELDS ─────────────────────────────────────────── */
        .field-group { display: flex; flex-direction: column; gap: 16px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-2);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .field-input-wrap { position: relative; }
        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 17px; height: 17px;
            color: var(--text-3);
            pointer-events: none;
            transition: color 0.18s ease;
        }
        .field-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font);
            /* 16px prevents iOS Safari zoom */
            font-size: 16px;
            font-weight: 500;
            padding: 14px 16px;
            min-height: 52px;
            transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .field-input::placeholder { color: var(--text-3); font-weight: 400; font-size: 15px; }
        .field-input:focus {
            border-color: var(--border-focus);
            background: rgba(26,103,224,0.06);
            box-shadow: 0 0 0 3px rgba(26,103,224,0.13);
        }
        .field-input-wrap:focus-within .field-icon { color: var(--accent); }

        /* E-Visa field animation */
        .field-evisa {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.38s var(--ease), opacity 0.28s ease, margin 0.38s;
            margin-top: 0;
        }
        .field-evisa.visible { max-height: 90px; opacity: 1; }

        /* ─── SEARCH BUTTON ───────────────────────────────────────── */
        .btn-search {
            width: 100%;
            margin-top: 20px;
            border: none;
            border-radius: var(--radius);
            background: linear-gradient(135deg, #1a67e0 0%, #e8304a 100%);
            color: #fff;
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            padding: 16px;
            min-height: 56px;
            cursor: pointer;
            transition: opacity var(--dur) var(--ease), transform 0.18s var(--spring);
            position: relative;
            overflow: hidden;
            letter-spacing: -0.01em;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-search::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.10);
            opacity: 0;
            transition: opacity 0.18s;
        }
        .btn-search:hover::before { opacity: 1; }
        .btn-search:active { transform: scale(0.98); }
        .btn-search:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-search-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.30);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* ─── ERROR ALERT ─────────────────────────────────────────── */
        .error-alert {
            background: rgba(232,48,74,0.08);
            border: 1px solid rgba(232,48,74,0.20);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-top: 14px;
        }
        .error-alert-icon {
            font-size: 16px;
            flex-shrink: 0;
            line-height: 1.4;
        }
        .error-alert-text { font-size: 14px; color: #f05068; line-height: 1.5; }

        /* ─── RESULT WRAP ─────────────────────────────────────────── */
        .result-wrap {
            width: 100%;
            max-width: 520px;
            margin-top: 16px;
        }
        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        /* ─── STATUS HERO ─────────────────────────────────────────── */
        .status-hero {
            padding: 32px 24px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .status-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.08;
            pointer-events: none;
        }
        .status-hero.approved::before  { background: radial-gradient(circle at 50% 0%, var(--approved), transparent 65%); }
        .status-hero.pending::before   { background: radial-gradient(circle at 50% 0%, var(--pending), transparent 65%); }
        .status-hero.review::before    { background: radial-gradient(circle at 50% 0%, var(--review), transparent 65%); }
        .status-hero.rejected::before,
        .status-hero.cancelled::before { background: radial-gradient(circle at 50% 0%, var(--rejected), transparent 65%); }
        .status-hero.received::before  { background: radial-gradient(circle at 50% 0%, var(--received), transparent 65%); }
        .status-hero.used::before      { background: radial-gradient(circle at 50% 0%, var(--approved), transparent 65%); }

        .status-icon-wrap {
            width: 68px; height: 68px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 30px;
            position: relative;
        }
        .status-icon-wrap::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            opacity: 0.20;
            border: 1.5px solid currentColor;
        }
        .status-icon-wrap.approved  { background: rgba(48,209,88,.13); color: var(--approved); }
        .status-icon-wrap.pending   { background: rgba(255,159,10,.13); color: var(--pending); }
        .status-icon-wrap.review    { background: rgba(26,103,224,.13); color: var(--review); }
        .status-icon-wrap.rejected,
        .status-icon-wrap.cancelled { background: rgba(232,48,74,.13); color: var(--rejected); }
        .status-icon-wrap.received  { background: rgba(245,197,66,.13); color: var(--received); }
        .status-icon-wrap.used      { background: rgba(48,209,88,.13); color: var(--approved); }

        .status-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 100px;
            margin-bottom: 10px;
        }
        .status-label.approved  { background: rgba(48,209,88,.13); color: #30d158; }
        .status-label.pending   { background: rgba(255,159,10,.13); color: #ff9f0a; }
        .status-label.review    { background: rgba(26,103,224,.13); color: #4d8eff; }
        .status-label.rejected,
        .status-label.cancelled { background: rgba(232,48,74,.13); color: #f05068; }
        .status-label.received  { background: rgba(245,197,66,.13); color: #f5c542; }
        .status-label.used      { background: rgba(48,209,88,.13); color: #30d158; }

        .status-name {
            font-size: clamp(16px, 4.5vw, 19px);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            line-height: 1.35;
            word-wrap: break-word;
            word-break: break-word;
            margin-top: 6px;
            margin-bottom: 4px;
        }

        /* ─── DETAILS GRID ────────────────────────────────────────── */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
        }
        .detail-cell {
            background: rgba(9,9,15,0.85);
            padding: 16px 20px;
        }
        .detail-cell:last-child:nth-child(odd) { grid-column: span 2; }
        .detail-cell-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-3);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .detail-cell-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
            word-break: break-word;
        }

        /* ─── REJECTION BOX ───────────────────────────────────────── */
        .rejection-box {
            padding: 16px 20px;
            background: rgba(232,48,74,0.06);
            border-top: 1px solid rgba(232,48,74,0.14);
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .rejection-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
        .rejection-text { font-size: 14px; color: #f05068; line-height: 1.5; }

        /* ─── NOT FOUND ───────────────────────────────────────────── */
        .not-found {
            padding: 40px 24px;
            text-align: center;
        }
        .not-found-icon-wrap {
            width: 64px; height: 64px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .not-found-icon-wrap svg { width: 28px; height: 28px; color: var(--text-3); }
        .not-found-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }
        .not-found-sub {
            font-size: 14px;
            color: var(--text-2);
            line-height: 1.60;
        }

        /* ─── CACHED NOTICE ───────────────────────────────────────── */
        .cached-notice {
            padding: 12px 20px;
            font-size: 13px;
            color: #ff9f0a;
            background: rgba(255,159,10,0.06);
            border-top: 1px solid rgba(255,159,10,0.14);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ─── PDF BUTTON ──────────────────────────────────────────── */
        .btn-pdf {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            padding: 13px 24px;
            min-height: 48px;
            text-decoration: none;
            transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease), transform var(--dur) var(--ease);
            width: 100%;
        }
        .btn-pdf:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.16);
            transform: translateY(-1px);
        }
        .btn-pdf:active { transform: translateY(0); }

        /* ─── FOOTER ──────────────────────────────────────────────── */
        .page-footer {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            color: var(--text-3);
            animation: fadeIn 1s ease 0.5s both;
        }
        .page-footer a {
            color: var(--text-2);
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.10);
            transition: color 0.18s;
        }
        .page-footer a:hover { color: var(--text); }

        /* ─── ANIMATIONS ──────────────────────────────────────────── */
        @keyframes fadeIn    { from { opacity: 0 } to { opacity: 1 } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px) } to { opacity: 1; transform: translateY(0) } }
        @keyframes slideUp   { from { opacity: 0; transform: translateY(28px) scale(.97) } to { opacity: 1; transform: translateY(0) scale(1) } }
        @keyframes spin      { to { transform: rotate(360deg) } }
        @keyframes shake     { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
        @keyframes resultPop { 0%{transform:scale(.94) translateY(8px);opacity:0} 60%{transform:scale(1.01);opacity:1} 100%{transform:scale(1) translateY(0);opacity:1} }
        @keyframes skeleton  { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

        .shake     { animation: shake 0.38s ease; }
        .result-pop { animation: resultPop 0.45s var(--spring) both; }
        .field-input.error { border-color: rgba(232,48,74,0.50); background: rgba(232,48,74,0.06); }
        .field-input.skeleton {
            background: linear-gradient(90deg, var(--bg-input) 25%, rgba(255,255,255,0.11) 50%, var(--bg-input) 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s infinite linear;
            color: transparent !important;
            pointer-events: none;
        }

        /* ─── RIPPLE ──────────────────────────────────────────────── */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.20);
            transform: scale(0);
            animation: ripple-anim 0.5s linear;
            pointer-events: none;
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* ─── RESPONSIVE ──────────────────────────────────────────── */
        @media (max-width: 520px) {
            .page { padding: 24px 14px 52px; }
            .card { padding: 22px 18px; border-radius: var(--radius-lg); }
            .page-header h1 { font-size: clamp(20px, 6.5vw, 30px); }
        }
        @media (max-width: 380px) {
            .details-grid { grid-template-columns: 1fr; }
            .detail-cell:last-child:nth-child(odd) { grid-column: span 1; }
            .detail-cell { padding: 14px 16px; }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<!-- Subtle background orbs -->
<div class="bg-layer" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
</div>

<!-- ─── TOP NAV ─────────────────────────────────────────────────────── -->
<nav class="top-nav" aria-label="Page navigation">
    <div class="top-nav-inner">
        <a href="index.html" class="nav-logo" aria-label="KoreaVisa — Back to home">
            <div class="nav-logo-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </div>
            <div class="nav-logo-text">Korea<span>Visa</span></div>
        </a>
        <a href="index.html" class="nav-back" aria-label="Return to homepage">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
            Home
        </a>
    </div>
</nav>

<!-- ─── PAGE CONTENT ────────────────────────────────────────────────── -->
<div class="page">
    <!-- Header -->
    <header class="page-header">
        <h1>Visa Status Check</h1>
    </header>

    <!-- Main Form Card -->
    <div class="card" role="main">
        <!-- Visa Type Segment -->
        <div class="segment-wrap" role="group" aria-label="Visa type">
            <button class="segment-btn active" id="btnEmbassy" onclick="selectType('Embassy')" aria-pressed="true">Embassy</button>
            <button class="segment-btn" id="btnEVisa" onclick="selectType('E-Visa')" aria-pressed="false">E-Visa</button>
        </div>

        <!-- Form Fields -->
        <div class="field-group">
            <div class="field">
                <label class="field-label" for="passportInput">Passport Number</label>
                <div class="field-input-wrap">
                    <input type="text" id="passportInput" class="field-input" placeholder="FA1234567"
                        autocomplete="off" autocapitalize="characters" spellcheck="false"
                        maxlength="20" aria-required="true" inputmode="text">
                </div>
            </div>

            <div class="field">
                <label class="field-label" for="nameInput">Full Name (as in passport)</label>
                <div class="field-input-wrap">
                    <input type="text" id="nameInput" class="field-input" placeholder="ABDUVOHIDOV KUVONCHBEK"
                        autocomplete="off" autocapitalize="characters" spellcheck="false" aria-required="true">
                </div>
            </div>

            <div class="field">
                <label class="field-label" for="dobInput">Date of Birth</label>
                <div class="field-input-wrap">
                    <input type="text" id="dobInput" class="field-input" placeholder="YYYY-MM-DD"
                        autocomplete="off" maxlength="10" aria-required="true" inputmode="numeric">
                </div>

            <div class="field field-evisa" id="evisaField" aria-hidden="true">
                <label class="field-label" for="appNoInput">Application Number</label>
                <div class="field-input-wrap">
                    <input type="text" id="appNoInput" class="field-input" placeholder="AP2026123456"
                        autocomplete="off" autocapitalize="characters" spellcheck="false" maxlength="30">
                </div>
            </div>
        </div>

        <!-- Search Button -->
        <button class="btn-search" id="searchBtn" onclick="handleSearch(event)" aria-label="Check visa status">
            <div class="btn-search-inner" id="btnInner">
                Check Status
            </div>
        </button>

        <!-- Inline Error -->
        <div id="errorAlert" class="error-alert" style="display:none;" role="alert" aria-live="polite">
            <span class="error-alert-icon">&#9888;&#65039;</span>
            <span class="error-alert-text" id="errorText"></span>
        </div>

    <!-- Result -->
    <div class="result-wrap" id="resultWrap" style="display:none;" aria-live="polite" aria-label="Visa status result">
        <div class="result-card" id="resultCard"></div>

</div>

<!-- ─── ALL JS PRESERVED EXACTLY ────────────────────────────────────── -->
<script>
const isLocal = (
    window.location.hostname === "localhost" ||
    window.location.hostname === "127.0.0.1" ||
    window.location.hostname === "" ||
    window.location.protocol === "file:"
) && window.location.port !== "3000";

const API_CHECK_STATUS = isLocal ? "http://localhost:3000/check-status" : "/api/check-status";
const API_STUDENTS     = isLocal ? "http://localhost:3000/api/students" : "/api/students";
const API_DOWNLOAD_PDF = isLocal ? "http://localhost:3000/download-visa-pdf" : "/api/download-visa-pdf";

let visaType='Embassy';
function selectType(t){
    visaType=t;
    const be=document.getElementById('btnEmbassy'),bv=document.getElementById('btnEVisa'),ef=document.getElementById('evisaField');
    if(t==='Embassy'){be.classList.add('active');be.setAttribute('aria-pressed','true');bv.classList.remove('active');bv.setAttribute('aria-pressed','false');ef.classList.remove('visible');ef.setAttribute('aria-hidden','true');}
    else{bv.classList.add('active');bv.setAttribute('aria-pressed','true');be.classList.remove('active');be.setAttribute('aria-pressed','false');ef.classList.add('visible');ef.setAttribute('aria-hidden','false');}
    clearResult();
}
document.getElementById('dobInput').addEventListener('input',function(){
    let v=this.value.replace(/[^0-9]/g,'');
    if(v.length>4)v=v.slice(0,4)+'-'+v.slice(4);
    if(v.length>7)v=v.slice(0,7)+'-'+v.slice(7);
    if(v.length>10)v=v.slice(0,10);
    this.value=v;
});
['passportInput','nameInput','appNoInput'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('input',function(){const s=this.selectionStart,e=this.selectionEnd;this.value=this.value.toUpperCase();this.setSelectionRange(s,e);});
});

/* ── Passport autofill from Turso ── */
let _autofillTimer=null;
let _lastAutofillPassport='';
let _autofillApplied=false;

document.getElementById('passportInput').addEventListener('input',function(){
    clearTimeout(_autofillTimer);
    const passport=this.value.trim().toUpperCase();
    if(passport.length<3){_lastAutofillPassport='';_autofillApplied=false;return;}
    if(passport===_lastAutofillPassport)return;
    _autofillTimer=setTimeout(()=>autofillFromDb(passport),600);
});

async function autofillFromDb(passport){
    const nameEl=document.getElementById('nameInput');
    const dobEl=document.getElementById('dobInput');

    const elsToAnimate = [];
    if(nameEl&&!nameEl.dataset.userEdited) elsToAnimate.push(nameEl);
    if(dobEl&&!dobEl.dataset.userEdited) elsToAnimate.push(dobEl);

    elsToAnimate.forEach(el=>el.classList.add('skeleton'));

    try{
        const res=await fetch(`${API_STUDENTS}?passport=${encodeURIComponent(passport)}&public=true`);
        if(!res.ok) return;
        const rows=await res.json();
        if(!rows||rows.length===0) return;
        const s=rows[0];
        _lastAutofillPassport=passport;
        _autofillApplied=true;

        if(s.fullName&&nameEl&&!nameEl.dataset.userEdited){
            nameEl.value=s.fullName;
        }
        if(s.birthday&&dobEl&&!dobEl.dataset.userEdited){
            dobEl.value=s.birthday;
        }
        if(s.visaType&&(s.visaType==='Embassy'||s.visaType==='E-Visa')){
            if(visaType!==s.visaType)selectType(s.visaType);
        }
    }catch(_){/* silently ignore network errors */}
    finally{
        elsToAnimate.forEach(el=>el.classList.remove('skeleton'));
    }
}

['nameInput','dobInput','appNoInput'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('input',()=>{el.dataset.userEdited='1';});
});
document.getElementById('passportInput').addEventListener('input',()=>{
    ['nameInput','dobInput','appNoInput'].forEach(id=>{
        const el=document.getElementById(id);
        if(el)delete el.dataset.userEdited;
    });
});
async function handleSearch(event){
    addRipple(event);clearError();clearResult();
    const passport=document.getElementById('passportInput').value.trim().toUpperCase();
    const name=document.getElementById('nameInput').value.trim().toUpperCase();
    const dob=document.getElementById('dobInput').value.trim();
    const appNo=document.getElementById('appNoInput').value.trim().toUpperCase();
    if(!passport){shakeField('passportInput');showError('Passport number is required.');return;}
    if(!name){shakeField('nameInput');showError('Full name is required.');return;}
    if(!dob){shakeField('dobInput');showError('Date of birth is required.');return;}
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dob)){shakeField('dobInput');showError('Date of birth must be in YYYY-MM-DD format (e.g. 1998-07-15).');return;}
    if(visaType==='E-Visa'&&!appNo){shakeField('appNoInput');showError('Application number is required for E-Visa.');return;}
    setLoading(true);
    try{
        const res=await fetch(API_CHECK_STATUS,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({passport_number:passport,english_name:name,birth_date:dob,visa_type:visaType,application_no:appNo})});
        if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`Server error (${res.status})`);}
        const data=await res.json();

        if(!data.found){
            try{
                const cached=await fetch(`${API_STUDENTS}?passport=${encodeURIComponent(passport)}&public=true`);
                if(cached.ok){
                    const rows=await cached.json();
                    const s=rows&&rows[0];
                    const realStatuses=['APPROVED','VISA USED','UNDER REVIEW','APP/RECEIVED','RECEIVED','REJECTED','CANCELLED','RETURNED','PENDING SUPPLEMENT','EXPIRED'];
                    if(s&&realStatuses.includes((s.status||'').toUpperCase())){
                        let extra = {};
                        try { extra = JSON.parse(s.apiResponse || '{}'); } catch(e){}
                        const synth={
                            found:true,
                            status:s.status,
                            applicationDate:s.applicationDate||(s.lastChecked?s.lastChecked.slice(0,10):''),
                            rejectionReason:s.rejectReason||'',
                            entryDate:extra.entryDate||'',
                            entryPurpose:extra.entryPurpose||'',
                            visaExpiry:extra.visaExpiry||'',
                            visaKind:extra.visaKind||'',
                            statusOfResidence:extra.statusOfResidence||'',
                            invitingCompany:extra.invitingCompany||'',
                            source:'cached',
                            lastChecked:s.lastChecked||'',
                        };
                        renderResult(synth,{passport,name,dob,appNo},true);
                        return;
                    }
                }
            }catch(_){}
            renderResult(data,{passport,name,dob,appNo},false);
            return;
        }

        renderResult(data,{passport,name,dob,appNo},false);
    }catch(err){
        let msg=err.message||'Unknown error';
        if(msg.includes('Failed to fetch')||msg.includes('NetworkError')||msg.includes('ECONNREFUSED'))msg='Unable to reach the server. Please try again in a moment.';
        showError(msg);
    }finally{setLoading(false);}
}
const STATUS_CONFIG={'APPROVED':{cls:'approved',icon:'✅',label:'Approved'},'VISA USED':{cls:'used',icon:'🛂',label:'Visa Used'},'UNDER REVIEW':{cls:'review',icon:'🔍',label:'Under Review'},'APP/RECEIVED':{cls:'received',icon:'📥',label:'App. Received'},'RECEIVED':{cls:'received',icon:'📥',label:'Received'},'REJECTED':{cls:'rejected',icon:'❌',label:'Rejected'},'CANCELLED':{cls:'cancelled',icon:'🚫',label:'Cancelled'},'RETURNED':{cls:'cancelled',icon:'↩️',label:'Returned'},'PENDING SUPPLEMENT':{cls:'pending',icon:'📋',label:'Supplement Needed'},'EXPIRED':{cls:'rejected',icon:'⏰',label:'Expired'},'UNKNOWN':{cls:'pending',icon:'❓',label:'Unknown'},'Pending':{cls:'pending',icon:'⏳',label:'Pending'}};
function fmtAgo(iso){
    if(!iso)return'some time ago';
    const diff=Date.now()-new Date(iso).getTime();
    const m=Math.floor(diff/60000);
    if(m<1)return'just now';
    if(m<60)return m+' min. ago';
    const h=Math.floor(m/60);
    if(h<24)return h+' hr. ago';
    return Math.floor(h/24)+' days ago';
}
function renderResult(data,input,cached){
    const wrap=document.getElementById('resultWrap'),card=document.getElementById('resultCard');
    if(!data.found){
        card.innerHTML=`<div class="not-found"><div class="not-found-icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="not-found-title">No Record Found</div><div class="not-found-sub">No visa application was found for this passport.<br>Please double-check your details and try again.</div></div>`;
        wrap.style.display='';
        return;
    }
    const raw=data.status||'UNKNOWN',cfg=STATUS_CONFIG[raw]||{cls:'pending',icon:'❓',label:raw};
    const appDate=data.applicationDate||'—',entryDate=data.entryDate||'—',purpose=data.entryPurpose||'—';
    
    const cells=[
        {label:'Passport',value:input.passport},
        {label:'Applied',value:appDate},
        ...(entryDate!=='—'&&entryDate!==''?[{label:'Issued Date',value:entryDate}]:[]),
        ...(data.statusOfResidence?[{label:'Residency Class',value:data.statusOfResidence}]:[]),
        ...(data.visaKind?[{label:'Visa Category',value:data.visaKind}]:[]),
        ...(data.visaExpiry?[{label:'Expiry Date',value:data.visaExpiry}]:[]),
        ...(data.invitingCompany?[{label:'Inviting Company',value:data.invitingCompany}]:[]),
        ...(purpose!=='—'&&purpose!==''&&purpose!==data.statusOfResidence?[{label:'Purpose',value:purpose}]:[]),
        {label:'Visa Mode',value:visaType}
    ];
    
    const cellsHtml=cells.map(c=>`<div class="detail-cell"><div class="detail-cell-label">${esc(c.label)}</div><div class="detail-cell-value">${esc(c.value)}</div></div>`).join('');
    
    const rejHtml=data.rejectionReason?`<div class="rejection-box"><span class="rejection-icon">⚠️</span><div class="rejection-text"><strong>Reason:</strong> ${esc(data.rejectionReason)}</div></div>`:'';
        
    let downloadBtnHtml = '';
    const statusUpper = raw.toUpperCase();
    if (data.pdfUrl || statusUpper === 'APPROVED' || statusUpper === 'VISA USED') {
        const queryParams = new URLSearchParams({
            passport: input.passport,
            full_name: input.name,
            birth_date: input.dob,
            visa_type: visaType,
            application_no: input.appNo || ''
        });
        downloadBtnHtml = `
            <div style="padding: 16px 20px 20px; background: rgba(9,9,15,0.85); border-top: 1px solid var(--border);">
                <a href="${API_DOWNLOAD_PDF}?${queryParams.toString()}" target="_blank" class="btn-pdf">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download Certificate PDF
                </a>
            </div>
        `;
    }
        
    const displayName=input.name;
    card.innerHTML=`<div class="status-hero ${cfg.cls}"><div class="status-label ${cfg.cls}">${esc(cfg.label)}</div><div class="status-name">${esc(displayName)}</div></div><div style="height:1px;background:var(--border)"></div><div class="details-grid">${cellsHtml}</div>${rejHtml}${downloadBtnHtml}`;
    wrap.classList.remove('result-pop');void wrap.offsetWidth;wrap.classList.add('result-pop');
    wrap.style.display='';
    setTimeout(()=>wrap.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function clearResult(){const w=document.getElementById('resultWrap');w.style.display='none';document.getElementById('resultCard').innerHTML='';}
function clearError(){document.getElementById('errorAlert').style.display='none';document.querySelectorAll('.field-input').forEach(i=>i.classList.remove('error'));}
function showError(msg){const el=document.getElementById('errorAlert');document.getElementById('errorText').textContent=msg;el.style.display='flex';}
function shakeField(id){const el=document.getElementById(id);if(!el)return;el.classList.add('error','shake');el.addEventListener('animationend',()=>el.classList.remove('shake'),{once:true});}
function setLoading(on){const btn=document.getElementById('searchBtn'),inner=document.getElementById('btnInner');btn.disabled=on;inner.innerHTML=on?'<div class="spinner"></div> Checking…':'Check Status';}
function addRipple(e){const btn=document.getElementById('searchBtn'),rect=btn.getBoundingClientRect(),size=Math.max(rect.width,rect.height),x=(e.clientX||rect.left+rect.width/2)-rect.left-size/2,y=(e.clientY||rect.top+rect.height/2)-rect.top-size/2,rpl=document.createElement('span');rpl.className='ripple';rpl.style.cssText=`width:${size}px;height:${size}px;left:${x}px;top:${y}px`;btn.appendChild(rpl);rpl.addEventListener('animationend',()=>rpl.remove());}
document.querySelectorAll('.field-input').forEach(i=>i.addEventListener('keydown',e=>{if(e.key==='Enter')handleSearch(e);}));
</script>
