<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Visa Status Check — KoreaVisa</title>
    <meta name="description" content="Check your Korean visa application status instantly. Free, no signup required. Supports Embassy and E-Visa applications via visa.go.kr.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛂</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        /* ─── RESET & TOKENS ──────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #F8FAFC;
            --card:         #FFFFFF;
            --border:       #E5E7EB;
            --border-strong:#D1D5DB;
            --primary:      #0F172A;
            --text-2:       #64748B;
            --text-3:       #94A3B8;
            --success:      #16A34A;
            --success-bg:   #F0FDF4;
            --success-brd:  #BBF7D0;
            --warning:      #D97706;
            --warning-bg:   #FFFBEB;
            --warning-brd:  #FDE68A;
            --danger:       #DC2626;
            --danger-bg:    #FEF2F2;
            --danger-brd:   #FECACA;
            --accent:       #2563EB;
            --accent-bg:    #EFF6FF;
            --accent-brd:   #BFDBFE;
            --font:         'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --ease:         cubic-bezier(0.16, 1, 0.3, 1);
            --dur:          0.18s;
            --radius-sm:    6px;
            --radius:       10px;
            --radius-lg:    14px;
            --nav-h:        60px;
            --shadow-xs:    0 1px 2px rgba(15,23,42,0.04);
            --shadow-sm:    0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
            --shadow-md:    0 4px 12px rgba(15,23,42,0.07), 0 2px 4px rgba(15,23,42,0.04);
            --shadow-lg:    0 12px 32px rgba(15,23,42,0.10), 0 4px 8px rgba(15,23,42,0.04);
        }

        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--primary);
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ─── TOP NAV ─────────────────────────────────────────────── */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--nav-h);
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .top-nav-inner {
            max-width: 560px;
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 9px;
            text-decoration: none;
            color: var(--primary);
        }
        .nav-logo-icon {
            width: 28px; height: 28px;
            background: var(--primary);
            border-radius: 7px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }
        .nav-logo-icon svg { width: 15px; height: 15px; stroke: #fff; }
        .nav-logo-text {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .nav-logo-text span { color: var(--accent); }
        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-2);
            text-decoration: none;
            padding: 7px 12px;
            border-radius: var(--radius-sm);
            transition: color var(--dur) var(--ease), background var(--dur) var(--ease);
            min-height: 34px;
        }
        .nav-back:hover {
            color: var(--primary);
            background: #F1F5F9;
        }
        .nav-back svg { width: 14px; height: 14px; flex-shrink: 0; }

        /* ─── PAGE LAYOUT ─────────────────────────────────────────── */
        .page {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100dvh - var(--nav-h));
            padding: 48px 24px 64px;
            animation: fadeIn 0.4s ease both;
        }

        /* ─── HEADER ──────────────────────────────────────────────── */
        .page-header {
            text-align: center;
            margin-bottom: 32px;
            width: 100%;
            max-width: 480px;
            animation: slideDown 0.5s var(--ease) both;
        }
        .page-header h1 {
            font-size: clamp(24px, 5vw, 32px);
            font-weight: 700;
            letter-spacing: -0.025em;
            line-height: 1.15;
            color: var(--primary);
        }

        /* ─── MAIN CARD ───────────────────────────────────────────── */
        .card {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            animation: slideUp 0.5s var(--ease) 0.05s both;
            box-shadow: var(--shadow-sm);
        }

        /* ─── SEGMENT CONTROL ─────────────────────────────────────── */
        .segment-wrap {
            background: #F1F5F9;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 3px;
            display: flex;
            gap: 3px;
            margin-bottom: 24px;
        }
        .segment-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-2);
            font-family: var(--font);
            font-size: 13.5px;
            font-weight: 600;
            padding: 10px 10px;
            min-height: 40px;
            border-radius: calc(var(--radius) - 3px);
            cursor: pointer;
            transition: color var(--dur) var(--ease), background var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
            -webkit-tap-highlight-color: transparent;
        }
        .segment-btn.active {
            background: #fff;
            color: var(--primary);
            box-shadow: var(--shadow-xs);
        }
        .segment-btn:not(.active):hover {
            color: var(--primary);
        }

        /* ─── FORM FIELDS ─────────────────────────────────────────── */
        .field-group { display: flex; flex-direction: column; gap: 16px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-2);
            letter-spacing: 0.01em;
        }
        .field-input-wrap { position: relative; }
        .field-input {
            width: 100%;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--primary);
            font-family: var(--font);
            /* 16px prevents iOS Safari zoom */
            font-size: 16px;
            font-weight: 500;
            padding: 13px 15px;
            min-height: 46px;
            transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .field-input::placeholder { color: var(--text-3); font-weight: 400; font-size: 15px; }
        .field-input:hover { border-color: var(--border-strong); }
        /* Long full names (as printed on passports) can overflow at 16px — trim ~15% */
        #nameInput { font-size: 13.6px; }
        #nameInput::placeholder { font-size: 13px; }
        .field-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.14);
        }

        /* E-Visa field animation */
        .field-evisa {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.35s var(--ease), opacity 0.25s ease;
        }
        .field-evisa.visible { max-height: 90px; opacity: 1; }

        /* ─── SEARCH BUTTON ───────────────────────────────────────── */
        .btn-search {
            width: 100%;
            margin-top: 20px;
            border: none;
            border-radius: var(--radius);
            background: var(--primary);
            color: #fff;
            font-family: var(--font);
            font-size: 15px;
            font-weight: 600;
            padding: 14px;
            min-height: 48px;
            cursor: pointer;
            transition: background var(--dur) var(--ease), transform 0.1s var(--ease);
            position: relative;
            overflow: hidden;
            letter-spacing: -0.005em;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-search:hover { background: #1E293B; }
        .btn-search:active { transform: scale(0.98); }
        .btn-search:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-search-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Skeleton loading dots inline in button */
        .btn-dots { display: inline-flex; gap: 4px; align-items: center; }
        .btn-dots span {
            width: 5px; height: 5px; border-radius: 50%;
            background: rgba(255,255,255,0.9);
            animation: dotPulse 1.1s ease-in-out infinite;
        }
        .btn-dots span:nth-child(2) { animation-delay: 0.15s; }
        .btn-dots span:nth-child(3) { animation-delay: 0.3s; }

        /* ─── ERROR ALERT ─────────────────────────────────────────── */
        .error-alert {
            background: var(--danger-bg);
            border: 1px solid var(--danger-brd);
            border-radius: var(--radius);
            padding: 13px 15px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-top: 14px;
            animation: fadeIn 0.25s ease both;
        }
        .error-alert-icon { flex-shrink: 0; line-height: 1.4; color: var(--danger); margin-top: 1px; }
        .error-alert-icon svg { width: 16px; height: 16px; }
        .error-alert-text { font-size: 13.5px; color: #991B1B; line-height: 1.5; }

        /* ─── RESULT WRAP ─────────────────────────────────────────── */
        .result-wrap {
            width: 100%;
            max-width: 480px;
            margin-top: 16px;
        }
        .result-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        /* ─── STATUS HERO ─────────────────────────────────────────── */
        .status-hero {
            padding: 28px 24px 22px;
            text-align: center;
        }

        .status-icon-wrap {
            width: 52px; height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
        }
        .status-icon-wrap svg { width: 24px; height: 24px; }
        .status-icon-wrap.approved,
        .status-icon-wrap.used      { background: var(--success-bg); color: var(--success); }
        .status-icon-wrap.pending,
        .status-icon-wrap.received  { background: var(--warning-bg); color: var(--warning); }
        .status-icon-wrap.review    { background: var(--accent-bg); color: var(--accent); }
        .status-icon-wrap.rejected,
        .status-icon-wrap.cancelled { background: var(--danger-bg); color: var(--danger); }

        .status-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 4px 11px;
            border-radius: 100px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            animation: badgeFade 0.35s ease 0.1s both;
        }
        .status-label.approved,
        .status-label.used      { background: var(--success-bg); color: var(--success); border-color: var(--success-brd); }
        .status-label.pending,
        .status-label.received  { background: var(--warning-bg); color: var(--warning); border-color: var(--warning-brd); }
        .status-label.review    { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-brd); }
        .status-label.rejected,
        .status-label.cancelled { background: var(--danger-bg); color: var(--danger); border-color: var(--danger-brd); }

        .status-name {
            font-size: clamp(16px, 4vw, 18px);
            font-weight: 700;
            letter-spacing: -0.015em;
            color: var(--primary);
            line-height: 1.35;
            word-wrap: break-word;
            word-break: break-word;
            margin-top: 4px;
        }

        /* ─── DETAILS GRID ────────────────────────────────────────── */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
            border-top: 1px solid var(--border);
        }
        .detail-cell {
            background: var(--card);
            padding: 14px 20px;
            position: relative;
        }
        .detail-cell:last-child:nth-child(odd) { grid-column: span 2; }
        .detail-cell-label {
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text-3);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .detail-cell-value {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--primary);
            line-height: 1.3;
            word-break: break-word;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Copy button — appears on hover */
        .copy-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px; height: 20px;
            border: none;
            background: #F1F5F9;
            border-radius: 5px;
            color: var(--text-2);
            cursor: pointer;
            opacity: 0;
            transform: translateX(-2px);
            transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease), background var(--dur) var(--ease), color var(--dur) var(--ease);
            flex-shrink: 0;
        }
        .copy-btn svg { width: 11px; height: 11px; }
        .detail-cell:hover .copy-btn,
        .copy-btn:focus-visible { opacity: 1; transform: translateX(0); }
        .copy-btn:hover { background: var(--accent-bg); color: var(--accent); }
        .copy-btn.copied { background: var(--success-bg); color: var(--success); opacity: 1; }

        /* ─── REJECTION BOX ───────────────────────────────────────── */
        .rejection-box {
            padding: 14px 20px;
            background: var(--danger-bg);
            border-top: 1px solid var(--danger-brd);
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .rejection-icon { flex-shrink: 0; margin-top: 1px; color: var(--danger); }
        .rejection-icon svg { width: 15px; height: 15px; }
        .rejection-text { font-size: 13.5px; color: #991B1B; line-height: 1.5; }
        .rejection-text strong { color: #7F1D1D; }

        /* ─── NOT FOUND ───────────────────────────────────────────── */
        .not-found {
            padding: 40px 24px;
            text-align: center;
        }
        .not-found-icon-wrap {
            width: 56px; height: 56px;
            background: #F1F5F9;
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .not-found-icon-wrap svg { width: 24px; height: 24px; color: var(--text-3); }
        .not-found-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 6px;
        }
        .not-found-sub {
            font-size: 13.5px;
            color: var(--text-2);
            line-height: 1.55;
        }

        /* ─── CACHED NOTICE ───────────────────────────────────────── */
        .cached-notice {
            padding: 11px 20px;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--warning);
            background: var(--warning-bg);
            border-top: 1px solid var(--warning-brd);
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .cached-notice svg { width: 13px; height: 13px; flex-shrink: 0; }

        /* ─── PDF BUTTON ──────────────────────────────────────────── */
        .btn-pdf {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--primary);
            font-family: var(--font);
            font-size: 13.5px;
            font-weight: 600;
            padding: 12px 24px;
            min-height: 44px;
            text-decoration: none;
            transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
            width: 100%;
        }
        .btn-pdf:hover {
            background: #F8FAFC;
            border-color: var(--border-strong);
        }
        .btn-pdf-wrap { padding: 16px 20px 20px; border-top: 1px solid var(--border); }

        /* ─── FOOTER ──────────────────────────────────────────────── */
        .page-footer {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            color: var(--text-3);
            animation: fadeIn 1s ease 0.4s both;
        }
        .page-footer a {
            color: var(--text-2);
            text-decoration: none;
            border-bottom: 1px solid var(--border);
            transition: color 0.18s;
        }
        .page-footer a:hover { color: var(--primary); }

        /* ─── TOAST ───────────────────────────────────────────────── */
        .toast-stack {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }
        .toast {
            display: flex;
            align-items: center;
            gap: 9px;
            background: var(--primary);
            color: #fff;
            font-size: 13.5px;
            font-weight: 500;
            padding: 12px 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s var(--ease) both, toastOut 0.25s ease 2.6s forwards;
        }
        .toast svg { width: 15px; height: 15px; color: var(--success); flex-shrink: 0; }

        /* ─── SKELETON ────────────────────────────────────────────── */
        .field-input.skeleton {
            color: transparent !important;
            background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 37%, #F1F5F9 63%);
            background-size: 400% 100%;
            animation: skeleton 1.4s ease infinite;
            pointer-events: none;
        }
        .skeleton-line {
            border-radius: 5px;
            background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 37%, #F1F5F9 63%);
            background-size: 400% 100%;
            animation: skeleton 1.4s ease infinite;
        }
        .result-skeleton { padding: 28px 24px; }
        .result-skeleton .sk-avatar { width: 52px; height: 52px; border-radius: 50%; margin: 0 auto 14px; }
        .result-skeleton .sk-badge { width: 88px; height: 18px; margin: 0 auto 10px; }
        .result-skeleton .sk-name { width: 60%; height: 18px; margin: 0 auto; }
        .result-skeleton .sk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-top: 1px solid var(--border); margin-top: 22px; }
        .result-skeleton .sk-cell { background: var(--card); padding: 14px 20px; display: flex; flex-direction: column; gap: 7px; }
        .result-skeleton .sk-label { width: 50%; height: 9px; }
        .result-skeleton .sk-value { width: 75%; height: 13px; }

        /* ─── ANIMATIONS ──────────────────────────────────────────── */
        @keyframes fadeIn    { from { opacity: 0 } to { opacity: 1 } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-14px) } to { opacity: 1; transform: translateY(0) } }
        @keyframes slideUp   { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
        @keyframes badgeFade { from { opacity: 0; transform: scale(0.92) } to { opacity: 1; transform: scale(1) } }
        @keyframes shake     { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }
        @keyframes resultSlideUp { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: translateY(0) } }
        @keyframes skeleton  { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        @keyframes dotPulse  { 0%,80%,100%{opacity:0.35;transform:scale(0.85)} 40%{opacity:1;transform:scale(1)} }
        @keyframes toastIn   { from { opacity: 0; transform: translateY(10px) scale(0.96) } to { opacity: 1; transform: translateY(0) scale(1) } }
        @keyframes toastOut  { to { opacity: 0; transform: translateY(6px) scale(0.98) } }
        @keyframes rippleAnim { to { transform: scale(2.6); opacity: 0; } }

        .shake      { animation: shake 0.36s ease; }
        .result-pop { animation: resultSlideUp 0.4s var(--ease) both; }
        .field-input.error { border-color: var(--danger); background: var(--danger-bg); }
        .field-input.error:focus { box-shadow: 0 0 0 3px rgba(220,38,38,0.14); }

        /* ─── RIPPLE ──────────────────────────────────────────────── */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.28);
            transform: scale(0);
            animation: rippleAnim 0.55s ease-out;
            pointer-events: none;
        }

        /* ─── RESPONSIVE ──────────────────────────────────────────── */
        @media (max-width: 520px) {
            .page { padding: 32px 16px 52px; }
            .card { padding: 22px 18px; }
            .page-header h1 { font-size: clamp(20px, 6vw, 26px); }
        }
        @media (max-width: 380px) {
            .details-grid, .result-skeleton .sk-grid { grid-template-columns: 1fr; }
            .detail-cell:last-child:nth-child(odd) { grid-column: span 1; }
            .detail-cell { padding: 13px 16px; }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<!-- ─── TOP NAV ─────────────────────────────────────────────────────── -->
<nav class="top-nav" aria-label="Page navigation">
    <div class="top-nav-inner">
        <a href="index.html" class="nav-logo" aria-label="KoreaVisa — Back to home">
            <div class="nav-logo-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>

</nav>

<!-- ─── PAGE CONTENT ────────────────────────────────────────────────── -->
<div class="page">
    <!-- Header -->
    <header class="page-header">
        <h1>Visa Status Check</h1>
    </header>

    <!-- Main Form Card -->
    <div class="card" role="main">
        <!-- Visa Type Segment -->
        <div class="segment-wrap" role="group" aria-label="Visa type">
            <button class="segment-btn active" id="btnEmbassy" onclick="selectType('Embassy')" aria-pressed="true">Embassy</button>
            <button class="segment-btn" id="btnEVisa" onclick="selectType('E-Visa')" aria-pressed="false">E-Visa</button>
        </div>

        <!-- Form Fields -->
        <div class="field-group">
            <div class="field">
                <label class="field-label" for="passportInput">Passport Number</label>

                        autocomplete="off" autocapitalize="characters" spellcheck="false"
                        maxlength="9" pattern="[A-Za-z]{2}[0-9]{7}" aria-required="true" inputmode="text">
                </div>
            </div>

            <div class="field">
                <label class="field-label" for="nameInput">Full Name (as in passport)</label>
                <div class="field-input-wrap">
                    <input type="text" id="nameInput" class="field-input" placeholder="AKHMATOV AZIZBEK MAKHMUDJON UGLI"
                        autocomplete="off" autocapitalize="characters" spellcheck="false" aria-required="true">
                </div>
            </div>

            <div class="field">
                <label class="field-label" for="dobInput">Date of Birth</label>
                <div class="field-input-wrap">
                    <input type="text" id="dobInput" class="field-input" placeholder="YYYY-MM-DD"
                        autocomplete="off" maxlength="10" aria-required="true" inputmode="numeric">
                </div>
            </div>

            <div class="field field-evisa" id="evisaField" aria-hidden="true">
                <label class="field-label" for="appNoInput">Application Number</label>
                <div class="field-input-wrap">
                    <input type="text" id="appNoInput" class="field-input" placeholder="AP2026123456"
                        autocomplete="off" autocapitalize="characters" spellcheck="false" maxlength="30">
                </div>
            </div>
        </div>

        <!-- Search Button -->
        <button class="btn-search" id="searchBtn" onclick="handleSearch(event)" aria-label="Check visa status">
            <div class="btn-search-inner" id="btnInner">
                Check Status

        <!-- Inline Error -->

        </div>

    <!-- Result -->
    <div class="result-wrap" id="resultWrap" style="display:none;" aria-live="polite" aria-label="Visa status result">
        <div class="result-card" id="resultCard"></div>
    </div>

    <!-- Footer -->
    <footer class="page-footer">
        <p><a href="index.html">← Back to Home</a></p>
    </footer>
</div>

<!-- Toast stack -->
<div class="toast-stack" id="toastStack" aria-live="polite"></div>

<!-- ─── SCRIPT ──────────────────────────────────────────────────────── -->
<script>
const isLocal = (
    window.location.hostname === "localhost" ||
    window.location.hostname === "127.0.0.1" ||
    window.location.hostname === "" ||
    window.location.protocol === "file:"
) && window.location.port !== "3000";

const API_CHECK_STATUS = isLocal ? "http://localhost:3000/check-status" : "/api/check-status";
const API_STUDENTS     = isLocal ? "http://localhost:3000/api/students" : "/api/students";
const API_DOWNLOAD_PDF = isLocal ? "http://localhost:3000/download-visa-pdf" : "/api/download-visa-pdf";

let visaType='Embassy';
function selectType(t){
    visaType=t;
    const be=document.getElementById('btnEmbassy'),bv=document.getElementById('btnEVisa'),ef=document.getElementById('evisaField');
    if(t==='Embassy'){be.classList.add('active');be.setAttribute('aria-pressed','true');bv.classList.remove('active');bv.setAttribute('aria-pressed','false');ef.classList.remove('visible');ef.setAttribute('aria-hidden','true');}
    else{bv.classList.add('active');bv.setAttribute('aria-pressed','true');be.classList.remove('active');be.setAttribute('aria-pressed','false');ef.classList.add('visible');ef.setAttribute('aria-hidden','false');}
    clearResult();
}
document.getElementById('dobInput').addEventListener('input',function(){
    let v=this.value.replace(/[^0-9]/g,'');
    if(v.length>4)v=v.slice(0,4)+'-'+v.slice(4);
    if(v.length>7)v=v.slice(0,7)+'-'+v.slice(7);
    if(v.length>10)v=v.slice(0,10);
    this.value=v;
});
['nameInput','appNoInput'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('input',function(){const s=this.selectionStart,e=this.selectionEnd;this.value=this.value.toUpperCase();this.setSelectionRange(s,e);});
});
/* Passport: force SSDDDDDDD (2 letters + 7 digits) as the user types */
document.getElementById('passportInput').addEventListener('input',function(){
    const s=this.selectionStart,e=this.selectionEnd;
    let raw=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
    const letters=raw.slice(0,2).replace(/[^A-Z]/g,'');
    const digits=raw.slice(2).replace(/[^0-9]/g,'').slice(0,7);
    this.value=letters+digits;
    this.setSelectionRange(s,e);
});

/* ── Passport autofill from Turso ── */
let _autofillTimer=null;
let _lastAutofillPassport='';
let _autofillApplied=false;

document.getElementById('passportInput').addEventListener('input',function(){
    clearTimeout(_autofillTimer);
    const passport=this.value.trim().toUpperCase();
    if(passport.length<3){_lastAutofillPassport='';_autofillApplied=false;return;}
    if(passport===_lastAutofillPassport)return;
    _autofillTimer=setTimeout(()=>autofillFromDb(passport),600);
});

async function autofillFromDb(passport){
    const nameEl=document.getElementById('nameInput');
    const dobEl=document.getElementById('dobInput');

    const elsToAnimate = [];
    if(nameEl&&!nameEl.dataset.userEdited) elsToAnimate.push(nameEl);
    if(dobEl&&!dobEl.dataset.userEdited) elsToAnimate.push(dobEl);

    elsToAnimate.forEach(el=>el.classList.add('skeleton'));

    try{
        const res=await fetch(`${API_STUDENTS}?passport=${encodeURIComponent(passport)}&public=true`);
        if(!res.ok) return;
        const rows=await res.json();
        if(!rows||rows.length===0) return;
        const s=rows[0];
        _lastAutofillPassport=passport;
        _autofillApplied=true;

        if(s.fullName&&nameEl&&!nameEl.dataset.userEdited){
            nameEl.value=s.fullName;
        }
        if(s.birthday&&dobEl&&!dobEl.dataset.userEdited){
            dobEl.value=s.birthday;
        }
        if(s.visaType&&(s.visaType==='Embassy'||s.visaType==='E-Visa')){
            if(visaType!==s.visaType)selectType(s.visaType);
        }
    }catch(_){/* silently ignore network errors */}
    finally{
        elsToAnimate.forEach(el=>el.classList.remove('skeleton'));
    }
}

['nameInput','dobInput','appNoInput'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('input',()=>{el.dataset.userEdited='1';});
});
document.getElementById('passportInput').addEventListener('input',()=>{
    ['nameInput','dobInput','appNoInput'].forEach(id=>{
        const el=document.getElementById(id);
        if(el)delete el.dataset.userEdited;
    });
});

function showResultSkeleton(){
    const wrap=document.getElementById('resultWrap'),card=document.getElementById('resultCard');
    card.innerHTML=`
        <div class="result-skeleton">
            <div class="skeleton-line sk-avatar"></div>
            <div class="skeleton-line sk-badge"></div>
            <div class="skeleton-line sk-name"></div>
        </div>
        <div class="sk-grid">
            ${Array.from({length:4}).map(()=>`<div class="sk-cell"><div class="skeleton-line sk-label"></div><div class="skeleton-line sk-value"></div></div>`).join('')}
        </div>
    `;
    wrap.classList.remove('result-pop');void wrap.offsetWidth;wrap.classList.add('result-pop');
    wrap.style.display='';
}

async function handleSearch(event){
    addRipple(event);clearError();
    const passport=document.getElementById('passportInput').value.trim().toUpperCase();
    const name=document.getElementById('nameInput').value.trim().toUpperCase();
    const dob=document.getElementById('dobInput').value.trim();
    const appNo=document.getElementById('appNoInput').value.trim().toUpperCase();
    if(!passport){shakeField('passportInput');showError('Passport number is required.');return;}
    if(!/^[A-Z]{2}\d{7}$/.test(passport)){shakeField('passportInput');showError('Passport number must be 2 letters followed by 7 digits (e.g. FA1234567).');return;}
    if(!name){shakeField('nameInput');showError('Full name is required.');return;}
    if(!dob){shakeField('dobInput');showError('Date of birth is required.');return;}
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dob)){shakeField('dobInput');showError('Date of birth must be in YYYY-MM-DD format (e.g. 1998-07-15).');return;}
    if(visaType==='E-Visa'&&!appNo){shakeField('appNoInput');showError('Application number is required for E-Visa.');return;}
    setLoading(true);
    showResultSkeleton();
    try{
        const res=await fetch(API_CHECK_STATUS,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({passport_number:passport,english_name:name,birth_date:dob,visa_type:visaType,application_no:appNo})});
        if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`Server error (${res.status})`);}
        const data=await res.json();

        if(!data.found){
            try{
                const cached=await fetch(`${API_STUDENTS}?passport=${encodeURIComponent(passport)}&public=true`);
                if(cached.ok){
                    const rows=await cached.json();
                    const s=rows&&rows[0];
                    const realStatuses=['APPROVED','VISA USED','UNDER REVIEW','APP/RECEIVED','RECEIVED','REJECTED','CANCELLED','RETURNED','PENDING SUPPLEMENT','EXPIRED'];
                    if(s&&realStatuses.includes((s.status||'').toUpperCase())){
                        let extra = {};
                        try { extra = JSON.parse(s.apiResponse || '{}'); } catch(e){}
                        const synth={
                            found:true,
                            status:s.status,
                            applicationDate:s.applicationDate||(s.lastChecked?s.lastChecked.slice(0,10):''),
                            rejectionReason:s.rejectReason||'',
                            entryDate:extra.entryDate||'',
                            entryPurpose:extra.entryPurpose||'',
                            visaExpiry:extra.visaExpiry||'',
                            visaKind:extra.visaKind||'',
                            statusOfResidence:extra.statusOfResidence||'',
                            invitingCompany:extra.invitingCompany||'',
                            source:'cached',
                            lastChecked:s.lastChecked||'',
                        };
                        renderResult(synth,{passport,name,dob,appNo},true);
                        return;
                    }
                }
            }catch(_){}
            renderResult(data,{passport,name,dob,appNo},false);
            return;
        }

        renderResult(data,{passport,name,dob,appNo},false);
        showToast('Visa status updated.');
    }catch(err){
        clearResult();
        let msg=err.message||'Unknown error';
        if(msg.includes('Failed to fetch')||msg.includes('NetworkError')||msg.includes('ECONNREFUSED'))msg='Unable to reach the server. Please try again in a moment.';
        showError(msg);
    }finally{setLoading(false);}
}

const ICONS = {
    check:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
    search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>',
    clock:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
    inbox:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>',
    x:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>',
    pass:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="12" cy="10" r="2.5"/><path d="M8 16h8"/></svg>'
};
const STATUS_CONFIG={
    'APPROVED':          {cls:'approved', icon:ICONS.check, label:'Approved'},
    'VISA USED':         {cls:'used',     icon:ICONS.pass,  label:'Visa Used'},
    'UNDER REVIEW':      {cls:'review',   icon:ICONS.search, label:'Under Review'},
    'APP/RECEIVED':      {cls:'received', icon:ICONS.inbox, label:'App. Received'},
    'RECEIVED':          {cls:'received', icon:ICONS.inbox, label:'Received'},
    'REJECTED':          {cls:'rejected', icon:ICONS.x,     label:'Rejected'},
    'CANCELLED':         {cls:'cancelled',icon:ICONS.x,     label:'Cancelled'},
    'RETURNED':          {cls:'cancelled',icon:ICONS.x,     label:'Returned'},
    'PENDING SUPPLEMENT':{cls:'pending',  icon:ICONS.clock, label:'Supplement Needed'},
    'EXPIRED':           {cls:'rejected', icon:ICONS.clock, label:'Expired'},
    'UNKNOWN':           {cls:'pending',  icon:ICONS.clock, label:'Unknown'},
    'Pending':           {cls:'pending',  icon:ICONS.clock, label:'Pending'}
};

function renderResult(data,input,cached){
    const wrap=document.getElementById('resultWrap'),card=document.getElementById('resultCard');
    if(!data.found){
        card.innerHTML=`<div class="not-found"><div class="not-found-icon-wrap">${ICONS.search.replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" stroke-width="1.75"')}</div><div class="not-found-title">No Record Found</div><div class="not-found-sub">No visa application was found for this passport.<br>Please double-check your details and try again.</div></div>`;
        wrap.classList.remove('result-pop');void wrap.offsetWidth;wrap.classList.add('result-pop');
        wrap.style.display='';
        return;
    }
    const raw=data.status||'UNKNOWN',cfg=STATUS_CONFIG[raw]||{cls:'pending',icon:ICONS.clock,label:raw};
    const appDate=data.applicationDate||'—',entryDate=data.entryDate||'—',purpose=data.entryPurpose||'—';

    const cells=[
        {label:'Passport',value:input.passport,copy:true},
        {label:'Applied',value:appDate},
        ...(entryDate!=='—'&&entryDate!==''?[{label:'Issued Date',value:entryDate}]:[]),
        ...(data.statusOfResidence?[{label:'Residency Class',value:data.statusOfResidence}]:[]),
        ...(data.visaKind?[{label:'Visa Category',value:data.visaKind}]:[]),
        ...(data.visaExpiry?[{label:'Expiry Date',value:data.visaExpiry}]:[]),
        ...(data.invitingCompany?[{label:'Inviting Company',value:data.invitingCompany}]:[]),
        ...(purpose!=='—'&&purpose!==''&&purpose!==data.statusOfResidence?[{label:'Purpose',value:purpose}]:[]),
        {label:'Visa Mode',value:visaType}
    ];

    const cellsHtml=cells.map(c=>`<div class="detail-cell"><div class="detail-cell-label">${esc(c.label)}</div><div class="detail-cell-value"><span>${esc(c.value)}</span>${c.copy?`<button type="button" class="copy-btn" onclick="copyValue(this,'${esc(c.value).replace(/'/g,"\\'")}')" aria-label="Copy ${esc(c.label)}" title="Copy">${ICONS.check.replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" class="copy-icon-default"')}<svg class="copy-icon-idle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`:''}</div></div>`).join('');

    const rejHtml=data.rejectionReason?`<div class="rejection-box"><span class="rejection-icon">${ICONS.x}</span><div class="rejection-text"><strong>Reason:</strong> ${esc(data.rejectionReason)}</div></div>`:'';

    const cachedHtml=cached?`<div class="cached-notice">${ICONS.clock}<span>Showing last known status${data.lastChecked?' from '+fmtAgo(data.lastChecked):''}. Live lookup unavailable.</span></div>`:'';

    let downloadBtnHtml = '';
    const statusUpper = raw.toUpperCase();
    if (data.pdfUrl || statusUpper === 'APPROVED' || statusUpper === 'VISA USED') {
        const queryParams = new URLSearchParams({
            passport: input.passport,
            full_name: input.name,
            birth_date: input.dob,
            visa_type: visaType,
            application_no: input.appNo || ''
        });
        downloadBtnHtml = `
            <div class="btn-pdf-wrap">
                <a href="${API_DOWNLOAD_PDF}?${queryParams.toString()}" target="_blank" class="btn-pdf">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download Certificate PDF
                </a>
            </div>
        `;
    }

    const displayName=input.name;
    card.innerHTML=`<div class="status-hero"><div class="status-icon-wrap ${cfg.cls}">${cfg.icon}</div><div class="status-label ${cfg.cls}">${esc(cfg.label)}</div><div class="status-name">${esc(displayName)}</div></div><div class="details-grid">${cellsHtml}</div>${rejHtml}${cachedHtml}${downloadBtnHtml}`;
    wrap.classList.remove('result-pop');void wrap.offsetWidth;wrap.classList.add('result-pop');
    wrap.style.display='';
    setTimeout(()=>wrap.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function fmtAgo(iso){
    if(!iso)return'some time ago';
    const diff=Date.now()-new Date(iso).getTime();
    const m=Math.floor(diff/60000);
    if(m<1)return'just now';
    if(m<60)return m+' min. ago';
    const h=Math.floor(m/60);
    if(h<24)return h+' hr. ago';
    return Math.floor(h/24)+' days ago';
}

function copyValue(btn,value){
    const doCopied=()=>{
        btn.classList.add('copied');
        const icons=btn.querySelectorAll('svg');
        icons.forEach(i=>i.style.display='none');
        btn.querySelector('.copy-icon-default').style.display='';
        setTimeout(()=>{btn.classList.remove('copied');icons.forEach(i=>i.style.display='');btn.querySelector('.copy-icon-idle').style.display='';btn.querySelector('.copy-icon-default').style.display='none';},1400);
    };
    if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(value).then(doCopied).catch(()=>{});
    }else{
        const ta=document.createElement('textarea');ta.value=value;document.body.appendChild(ta);ta.select();
        try{document.execCommand('copy');}catch(_){}
        document.body.removeChild(ta);doCopied();
    }
}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function clearResult(){const w=document.getElementById('resultWrap');w.style.display='none';document.getElementById('resultCard').innerHTML='';}
function clearError(){document.getElementById('errorAlert').style.display='none';document.querySelectorAll('.field-input').forEach(i=>i.classList.remove('error'));}
function showError(msg){const el=document.getElementById('errorAlert');document.getElementById('errorText').textContent=msg;el.style.display='flex';}
function shakeField(id){const el=document.getElementById(id);if(!el)return;el.classList.add('error','shake');el.addEventListener('animationend',()=>el.classList.remove('shake'),{once:true});}
function setLoading(on){
    const btn=document.getElementById('searchBtn'),inner=document.getElementById('btnInner');
    btn.disabled=on;
    inner.innerHTML=on?'<span class="btn-dots"><span></span><span></span><span></span></span> Checking':'Check Status';
}
function addRipple(e){
    const btn=document.getElementById('searchBtn'),rect=btn.getBoundingClientRect(),size=Math.max(rect.width,rect.height),
        x=(e.clientX||rect.left+rect.width/2)-rect.left-size/2,y=(e.clientY||rect.top+rect.height/2)-rect.top-size/2,
        rpl=document.createElement('span');
    rpl.className='ripple';
    rpl.style.cssText=`width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
    btn.appendChild(rpl);
    rpl.addEventListener('animationend',()=>rpl.remove());
}
function showToast(msg){
    const stack=document.getElementById('toastStack');
    const t=document.createElement('div');
    t.className='toast';
    t.innerHTML=`${ICONS.check}<span>${esc(msg)}</span>`;
    stack.appendChild(t);
    t.addEventListener('animationend',(e)=>{if(e.animationName==='toastOut')t.remove();});
}
document.querySelectorAll('.field-input').forEach(i=>i.addEventListener('keydown',e=>{if(e.key==='Enter')handleSearch(e);}));
</script>
