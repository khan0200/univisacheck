<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talaba Viza Holati</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      :root {
        --primary-color: #2563eb;
        --bg-color: #f7f7f8;
        --card-bg: rgba(255, 255, 255, 0.9);
        --text-main: #16181d;
        --text-muted: #71717a;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background-color: var(--bg-color);
        /* Quiet Luxury: a single neutral dot-grid, no colored glow */
        background-image: radial-gradient(rgba(15, 23, 42, 0.06) 1px, transparent 1px);
        background-size: 24px 24px;
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .glass-card {
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 480px;
        padding: 40px 30px;
        transition: all 0.3s ease;
      }

      .passport-input {
        text-transform: uppercase;
        font-size: 1.2rem;
        letter-spacing: 2px;
        text-align: center;
        border-radius: 16px;
        padding: 15px;
        border: 2px solid #e5e5ea;
        box-shadow: none !important;
        transition: border-color 0.2s;
      }

      .passport-input:focus {
        border-color: var(--primary-color);
      }

      .btn-check-status {
        border-radius: 16px;
        padding: 14px;
        font-size: 1.1rem;
        font-weight: 600;
        margin-top: 15px;
        transition: transform 0.1s;
      }
      .btn-check-status:active {
        transform: scale(0.98);
      }

      .result-section {
        display: none;
        animation: fadeIn 0.4s ease-out forwards;
        margin-top: 30px;
        padding-top: 25px;
        border-top: 1px solid #ebebf0;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .status-badge {
        font-size: 1.1rem;
        padding: 8px 20px;
        border-radius: 30px;
        font-weight: 600;
        display: inline-block;
        margin-bottom: 20px;
      }

      .status-APPROVED {
        background-color: rgba(22, 163, 74, 0.1);
        color: #16a34a;
      }
      .status-CANCELLED {
        background-color: rgba(220, 38, 38, 0.1);
        color: #dc2626;
      }
      .status-RECEIVED {
        background-color: rgba(217, 119, 6, 0.1);
        color: #d97706;
      }
      .status-UNDER {
        background-color: rgba(99, 102, 241, 0.1);
        color: #6366f1;
      }
      .status-Pending {
        background-color: rgba(113, 113, 122, 0.1);
        color: #71717a;
      }

      .info-row {
        display: flex;
        flex-direction: column;
        margin-bottom: 16px;
        text-align: left;
      }

      .info-label {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }

      .info-value {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--text-main);
      }

      .btn-download {
        background-color: #16a34a;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        margin-top: 20px;
        transition: all 0.2s;
      }

      .btn-download:hover {
        background-color: #15803d;
        color: white;
      }

      .spinner-border {
        width: 1.2rem;
        height: 1.2rem;
        border-width: 0.15em;
      }
    </style>
  </head>
  <body>
    <div class="glass-card text-center">
      <h3 class="fw-bold mb-2">Viza Holatini Tekshirish</h3>
      <p class="text-muted mb-4 small">
        Pasport raqamingizni kiriting va holatni tekshiring
      </p>

      <form id="checkForm" onsubmit="event.preventDefault()">
        <div class="mb-3">
          <input
            type="text"
            id="passportInput"
            class="form-control passport-input"
            placeholder="FA1234567"
            maxlength="9"
            autocomplete="off"
            required
          />
        </div>

        <button
          type="submit"
          id="checkBtn"
          class="btn btn-primary w-100 btn-check-status"
        >
          <span id="btnText">Holatni Tekshirish</span>
          <div
            id="btnSpinner"
            class="spinner-border text-light d-none"
            role="status"
          ></div>
        </button>
      </form>

      <!-- Error Message -->
      <div
        id="errorMsg"
        class="alert alert-danger mt-3 d-none text-start small border-0 rounded-4"
        style="background-color: #ffe5e5; color: #d70015"
      ></div>

      <!-- Result Section -->
      <div id="resultSection" class="result-section">
        <div id="statusBadge" class="status-badge">...</div>

        <div class="info-row">
          <span class="info-label">To'liq ism-sharif</span>
          <span class="info-value" id="resName">--</span>
        </div>

        <div class="info-row">
          <span class="info-label">Tug'ilgan sana</span>
          <span class="info-value" id="resDob">--</span>
        </div>

        <div class="info-row d-none" id="dateWrapper">
          <span class="info-label">Ariza topshirilgan sana</span>
          <span class="info-value" id="resAppDate">--</span>
        </div>

        <div class="info-row d-none" id="reasonWrapper">
          <span class="info-label text-danger">Rad etish sababi</span>
          <span class="info-value text-danger" id="resReason">--</span>
        </div>

        <a
          id="downloadBtn"
          href="#"
          class="btn-download text-decoration-none d-none"
        >
          <i class="bi bi-file-earmark-pdf-fill"></i> Viza PDF Yuklab Olish
          (Download)
        </a>
        <div id="downloadError" class="text-danger small mt-2 d-none fw-medium">
          PDF fayl topilmadi yoki xato yuz berdi.
        </div>
      </div>
    </div>

    <!-- Visa Checker Script -->
    <script type="module" src="status.js?v=1"></script>
  </body>
</html>
